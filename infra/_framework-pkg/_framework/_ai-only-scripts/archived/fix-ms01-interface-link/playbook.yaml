---
# Fix ms01-01 MaaS interface link state.
#
# Problem: maas_instance.this deploy fails with:
#   "This interface <mac> has a reserved ip 10.0.12.237 but it does not
#    have a link to that subnet"
#
# Cause: force-release via direct DB UPDATE left stale IP reservations
# on the NIC without proper interface-to-subnet link records.
#
# Fix:
#   1. Copy fix_interface_link.py to the MaaS server
#   2. Run it against ms01-01 to unlink stale links and re-link with AUTO mode
#
# After this runs:
#   - ms01-01 interfaces are cleanly linked to their subnets in AUTO mode
#   - Re-run: ./run -a -w on_prem.maas.machines

- name: Load framework config
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Load config_base role
      ansible.builtin.include_role:
        name: "{{ lookup('env', '_ANSIBLE_ROLES_DIR') }}/config_base"
    - name: Capture MaaS config facts
      ansible.builtin.include_tasks:
        file: "{{ lookup('env', '_INFRA_DIR') }}/maas-pkg/_tg_scripts/maas/configure-server/tasks/capture-config-fact.yaml"

    - name: Set script dir fact
      ansible.builtin.set_fact:
        _script_dir: "{{ lookup('env', 'SCRIPT_DIR') }}"

- name: Fix ms01-01 MaaS interface links
  hosts: maas_region
  gather_facts: false
  become: false

  tasks:
    - name: Login to MaaS CLI
      ansible.builtin.shell: >
        maas login admin http://localhost:5240/MAAS
        $(maas apikey --username admin)
      become: true
      changed_when: false
      no_log: true
      register: _login
      failed_when: _login.rc != 0

    - name: Find ms01-01 system_id
      ansible.builtin.shell: >
        sudo maas admin machines read
        | python3 -c "import sys,json; d=json.load(sys.stdin); m=[x for x in d if x['hostname']=='ms01-01']; print(m[0]['system_id'] if m else 'NOT_FOUND')"
      register: _system_id_result
      changed_when: false
      become: true

    - name: Assert machine found
      ansible.builtin.assert:
        that: _system_id_result.stdout | trim != 'NOT_FOUND'
        fail_msg: "ms01-01 not found in MaaS"

    - name: Set system_id fact
      ansible.builtin.set_fact:
        _system_id: "{{ _system_id_result.stdout | trim }}"

    - name: Copy fix script to MaaS server
      ansible.builtin.copy:
        src: "{{ hostvars['localhost']['_script_dir'] }}/fix_interface_link.py"
        dest: /tmp/fix_interface_link.py
        mode: "0755"

    - name: Run interface link fix script
      ansible.builtin.command:
        cmd: python3 /tmp/fix_interface_link.py {{ _system_id }}
      become: true
      register: _fix_result
      changed_when: true

    - name: Show fix output
      ansible.builtin.debug:
        msg: "{{ _fix_result.stdout_lines }}"

    - name: Clean up script
      ansible.builtin.file:
        path: /tmp/fix_interface_link.py
        state: absent
